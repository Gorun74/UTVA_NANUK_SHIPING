version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/nanuk.db
      - SECRET_KEY=dev-secret-key-change-in-prod
      - USER1_NAME=admin
      - USER1_PASS=admin123
      - USER2_NAME=colleague
      - USER2_PASS=col123
      - IMAGE_ROOT=/app/images
    volumes:
      - .:/app
      - nanuk_data:/app/instance

volumes:
  nanuk_data:
